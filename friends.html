<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friends — Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="friends.init()">

  <div id="friends-container">

    <!-- Sidebar -->
    <div id="friends-sidebar">
      <h2>Friends</h2>

      <a href="chat.html">
        <button class="sidebar-btn">← Back to Chat</button>
      </a>

      <button class="sidebar-btn" onclick="auth.logout()">Logout</button>
    </div>

    <!-- Main Friends Area -->
    <div id="friends-main">

      <!-- Add Friend -->
      <div class="friends-section">
        <h3>Add Friend</h3>
        <div class="add-friend-box">
          <input id="friend-username" placeholder="Enter username">
          <button id="send-request-btn">Send</button>
        </div>
      </div>

      <!-- Incoming Requests -->
      <div class="friends-section">
        <h3>Incoming Requests</h3>
        <div id="incoming-requests" class="list-box"></div>
      </div>

      <!-- Outgoing Requests -->
      <div class="friends-section">
        <h3>Outgoing Requests</h3>
        <div id="outgoing-requests" class="list-box"></div>
      </div>

      <!-- Friend List -->
      <div class="friends-section">
        <h3>Your Friends</h3>
        <div id="friend-list" class="list-box"></div>
      </div>

    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/auth.js"></script>
  <script src="public/friends.js"></script>

</body>
</html>
