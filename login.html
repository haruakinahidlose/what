<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Debug output box -->
  <pre id="debug-box" style="
    color:white;
    background:#000;
    padding:10px;
    margin-bottom:20px;
    font-size:12px;
    white-space:pre-wrap;
    max-height:200px;
    overflow-y:auto;
  ">[Debug output will appear here]</pre>

  <!-- Global debug() -->
  <script>
    function debug(msg, obj) {
      const box = document.getElementById("debug-box");
      box.innerText += "\n" + msg + (obj ? " " + JSON.stringify(obj) : "");
      console.log(msg, obj || "");
    }
  </script>

  <div class="center-box">
    <h1>Login</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="login-btn">Login</button>

    <p>
      Don't have an account?
      <a href="signup.html">Sign up</a>
    </p>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/auth.js"></script>
  <script src="public/app.js"></script>
  <script src="public/ui.js"></script>

  <script>
    debug("[login.html] Page loaded");

    ui.qs("#login-btn").onclick = async () => {
      const email = ui.qs("#email").value.trim();
      const password = ui.qs("#password").value.trim();

      debug("[login.html] Login button clicked", { email });

      if (!email || !password) {
        alert("Please fill out all fields");
        debug("[login.html] Missing fields");
        return;
      }

      try {
        debug("[login.html] Calling auth.login()");
        await auth.login(email, password);
        debug("[login.html] Login success, redirecting...");
        go("chat.html");
      } catch (err) {
        alert("Login failed");
        debug("[login.html] Login error:", err);
      }
    };
  </script>

</body>
</html>
